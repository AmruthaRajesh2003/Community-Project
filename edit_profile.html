{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - CHWMS</title>
    <link rel="stylesheet" href="{% static 'dashboard.css' %}">
    <style>
        /* --- Google Font Import --- */
        @import url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap');
        
        /* --- General Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html, body {
            display: grid;
            height: 100%;
            width: 100%;
            place-items: center;
            background: #f4f7f6; 
        }

        ::selection {
            background: #2a9d8f; 
            color: #fff;
        }

        /* --- Main Wrapper --- */
        .wrapper {
            overflow: hidden;
            max-width: 450px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 15px 20px rgba(0,0,0,0.1);
        }

        .wrapper .title {
            font-size: 35px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: #2a9d8f;
        }

        /* --- Form Styles --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0 15px;
            border: 1px solid lightgrey;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input,
        .form-group select {
            height: 50px;
        }

        .form-group textarea {
            padding-top: 10px;
            padding-bottom: 10px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #2a9d8f;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }

        /* --- Button Styles --- */
        .btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(to right, #2a9d8f, #268a7e);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(to right, #268a7e, #2a9d8f);
        }

        /* --- Link Styles --- */
        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            color: #2a9d8f;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        /* --- Error Messages --- */
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }

        .success-message {
            color: #28a745;
            font-size: 14px;
            margin-top: 5px;
        }

        /* --- Profile Picture Display --- */
        .profile-picture {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-picture img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #2a9d8f;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="title">Edit Profile</div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% if request.user.profile_picture %}
            <div class="profile-picture">
                <img src="{{ request.user.profile_picture.url }}" alt="Profile Picture">
            </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ request.user.first_name }}" placeholder="Enter your first name">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ request.user.last_name }}" placeholder="Enter your last name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ request.user.email }}" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone_number" value="{{ request.user.phone_number }}" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="date_of_birth" value="{% if request.user.date_of_birth %}{{ request.user.date_of_birth|date:'Y-m-d' }}{% endif %}">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="">Select Gender</option>
                    <option value="male" {% if request.user.gender == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if request.user.gender == 'female' %}selected{% endif %}>Female</option>
                    <option value="other" {% if request.user.gender == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="3" placeholder="Enter your address">{{ request.user.address }}</textarea>
            </div>

            {% if request.user.role == 'citizen' %}
            <div class="form-group">
                <label>Aadhaar Number</label>
                <input type="text" name="aadhar_number" value="{{ request.user.aadhar_number }}" placeholder="Enter 12 digit Aadhaar number">
            </div>
            {% endif %}

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" value="{{ request.user.city }}" placeholder="Enter your city">
            </div>

            <div class="form-group">
                <label>Emergency Contact Name</label>
                <input type="text" name="emergency_contact_name" value="{{ request.user.emergency_contact_name }}" placeholder="Enter emergency contact name">
            </div>

            <div class="form-group">
                <label>Emergency Contact Phone</label>
                <input type="tel" name="emergency_contact_phone" value="{{ request.user.emergency_contact_phone }}" placeholder="Enter emergency contact phone">
            </div>

            <div class="form-group">
                <label>Blood Group</label>
                <input type="text" name="blood_group" value="{{ request.user.blood_group }}" placeholder="Enter your blood group (e.g., A+)">
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_picture" accept="image/*">
            </div>

            <button type="submit" class="btn">Update Profile</button>
        </form>

        <div class="link">
            <a href="{% if request.user.is_health_worker %}{% url 'user:health_worker_dashboard' %}{% else %}{% url 'user:citizen_dashboard' %}{% endif %}">Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
